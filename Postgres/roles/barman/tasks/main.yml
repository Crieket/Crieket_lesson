   # === ИСПРАВЛЕННАЯ НАСТРОЙКА SSH ===

#  Генерируем ключ для postgres НА node1
  - name: generate SSH key for postgres
    user:
      name: postgres
      generate_ssh_key: yes
      ssh_key_type: rsa
      ssh_key_bits: 4096
      force: no
    delegate_to: node1        
    when: inventory_hostname == "barman"  

#  Получаем публичный ключ postgres С node1
  - name: fetch public ssh key from node1
    command: cat /var/lib/postgresql/.ssh/id_rsa.pub
    register: postgres_ssh_key
    delegate_to: node1         
    when: inventory_hostname == "barman"

#  Добавляем ключ postgres В authorized_keys barman
  - name: add postgres key to barman authorized_keys
    authorized_key:
      key: "{{ postgres_ssh_key.stdout }}"
      comment: "postgres@node1"
      user: barman
    when: inventory_hostname == "barman"  

  #  Генерируем ключ для barman НА barman
  - name: generate SSH key for barman
    user:
      name: barman
      generate_ssh_key: yes
      ssh_key_type: rsa
      ssh_key_bits: 4096
      force: no
    when: inventory_hostname == "barman"

  #  Получаем публичный ключ barman
  - name: fetch public ssh key from barman
    command: cat /var/lib/barman/.ssh/id_rsa.pub
    register: barman_ssh_key
    when: inventory_hostname == "barman"
  #  Добавляем ключ barman В authorized_keys postgres на node1
  - name: add barman key to postgres authorized_keys on node1
    authorized_key:
      key: "{{ barman_ssh_key.stdout }}"
      comment: "barman@backup"
      user: postgres
    delegate_to: node1         
    when: inventory_hostname == "barman"


    # Создание пользователя
  - name: Create barman user
    postgresql_user:
      name: barman
      password: '{{ barman_user_password }}'
      role_attr_flags: SUPERUSER
    become_user: postgres
    delegate_to: node1
    when: inventory_hostname == "barman"  

# Настройка pg_hba.conf 
  - name: Add permission for barman
    lineinfile:
      path: /etc/postgresql/14/main/pg_hba.conf
      line: 'host all {{ barman_user }} {{ barman_ip }}/32 trust'
    delegate_to: node1
    when: inventory_hostname == "barman" 

# Перезагрузка PostgreSQL
  - name: restart postgresql-server on node1
    service:
      name: postgresql
      state: restarted
    delegate_to: node1
    when: inventory_hostname == "barman" 

# Создание БД
  - name: Create DB for backup
    postgresql_db:
      name: otus_backup
      encoding: UTF-8
      template: template0
      state: present
    become_user: postgres
    delegate_to: node1
    when: inventory_hostname == "barman"  

# Создание таблицы
  - name: Add tables to otus_backup
    postgresql_table:
      db: otus_backup
      name: test1
      state: present
    become_user: postgres
    delegate_to: node1
    when: inventory_hostname == "barman"  


  # Копируем файл .pgpass
  - name: copy .pgpass
    template:
      src: .pgpass.j2
      dest: /var/lib/barman/.pgpass
      owner: barman
      group: barman
      mode: '0600'
    when: (inventory_hostname == "barman")

  # Копируем файл barman.conf
  - name: copy barman.conf
    template:
      src: barman.conf.j2
      dest: /etc/barman.conf 
      owner: barman
      group: barman
      mode: '0755'
    when: (inventory_hostname == "barman")

 # Копируем файл node1.conf
  - name: copy node1.conf
    template:
      src: node1.conf.j2
      dest: /etc/barman.d/node1.conf
      owner: barman
      group: barman
      mode: '0755'
    when: (inventory_hostname == "barman")

  - name: barman switch-wal node1
    become_user: barman
    shell: barman switch-wal node1
    when: (inventory_hostname == "barman")

  - name: barman cron
    become_user: barman
    shell: barman cron
    when: (inventory_hostname == "barman")
